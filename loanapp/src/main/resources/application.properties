spring.application.name=loanapp
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ── Clever Cloud free MySQL: max 5 connections allowed ──────────────────────
# HikariCP defaults to 10 which immediately exceeds the limit and crashes.
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Explicitly set dialect so Hibernate doesn't need an extra connection on startup
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

server.port=8080

# File upload path (override via UPLOAD_DIR env var on Render)
app.upload.dir=${UPLOAD_DIR:uploads}